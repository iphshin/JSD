<div id="app-root"></div>
<style>
  :root {
    --bg: #f6f7f5;
    --surface: #ffffff;
    --ink: #1e2a2b;
    --ink-soft: #5b6866;
    --line: #dfe4e0;
    --accent: #2f7a73;
    --accent-soft: #e4f0ee;
    --amber: #b8763a;
    --danger: #b1493a;
    --danger-soft: #f7e9e6;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  #app-root {
    background: var(--bg);
    color: var(--ink);
    min-height: 100%;
    padding: 20px 16px 40px;
    max-width: 560px;
    margin: 0 auto;
  }

  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .header h1 {
    font-size: 19px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0;
  }

  .header .drop { color: var(--accent); }

  .sync-status {
    font-size: 11px;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .sync-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
  }

  .sync-dot.error { background: var(--danger); }
  .sync-dot.busy { background: var(--amber); }

  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 16px;
  }

  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .month-nav .label {
    font-size: 16px;
    font-weight: 700;
  }

  .month-nav button {
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }

  .weekday-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 4px;
  }

  .weekday-row div {
    text-align: center;
    font-size: 11px;
    color: var(--ink-soft);
    font-weight: 700;
    text-transform: uppercase;
  }

  .day-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .day-cell {
    aspect-ratio: 1;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: #fbfbfa;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    padding: 2px;
  }

  .day-cell.empty {
    border: none;
    background: transparent;
    cursor: default;
  }

  .day-cell.today {
    border-color: var(--accent);
    border-width: 2px;
  }

  .day-cell.selected {
    background: var(--accent);
  }

  .day-cell.selected .day-num { color: #fff; }

  .day-num {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
  }

  .day-dots {
    display: flex;
    gap: 2px;
    margin-top: 2px;
  }

  .day-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
  }

  .day-dot.schedule { background: var(--accent); }
  .day-cell.selected .day-dot.schedule { background: #fff; }
  .day-dot.diary { background: var(--amber); }
  .day-cell.selected .day-dot.diary { background: #fff; }

  .card h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    margin: 0 0 14px 0;
    font-weight: 700;
  }

  .schedule-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
  }

  .schedule-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #fbfbfa;
    gap: 8px;
  }

  .schedule-content {
    flex: 1;
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .empty-state {
    text-align: center;
    color: var(--ink-soft);
    font-size: 13px;
    padding: 16px 0;
  }

  input[type="text"],
  textarea {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 9px 10px;
    font-size: 15px;
    background: #fbfbfa;
    color: var(--ink);
    width: 100%;
    font-family: inherit;
  }

  textarea {
    resize: vertical;
    min-height: 90px;
  }

  input:focus, textarea:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  button.primary {
    flex: 1;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 9px;
    padding: 11px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }

  button.primary:disabled { opacity: 0.5; cursor: default; }

  button.ghost {
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 11px 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .icon-btn {
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 13px;
    padding: 4px 7px;
    border-radius: 6px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .icon-btn.edit { color: var(--accent); }
  .icon-btn.delete { color: var(--danger); }

  .banner {
    font-size: 12px;
    color: var(--accent);
    background: var(--accent-soft);
    border-radius: 8px;
    padding: 8px 10px;
    margin-bottom: 14px;
    display: none;
  }

  .banner.show { display: block; }
  .banner.error { color: var(--danger); background: var(--danger-soft); }

  .loading {
    text-align: center;
    color: var(--ink-soft);
    padding: 30px 0;
    font-size: 13px;
  }

  .selected-date-label {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 12px;
  }
</style>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

// Apps Script web app deployed on the "david schedule" sheet, tab "Sheet1"
// Columns: Date (yyyy-MM-dd) | Type (schedule/diary) | Content
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyWv0RERF3B59nFHOhsjvuJPmzCNOqHlSdAyA7R7tJWzqDZBlgYMbFcMX3-4sBuNOXK/exec';

function pad(n) { return String(n).padStart(2, '0'); }

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}

function ymd(year, month, day) {
  return `${year}-${pad(month + 1)}-${pad(day)}`;
}

function formatMonthLabel(year, month) {
  return new Date(year, month, 1).toLocaleDateString(undefined, { year: 'numeric', month: 'long' });
}

function formatSelectedLabel(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString(undefined, { month: 'long', day: 'numeric', weekday: 'long' });
}

async function postAction(payload) {
  const res = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    cache: 'no-store',
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error('request failed (' + res.status + ')');
  const data = await res.json();
  if (data.ok === false) throw new Error(data.error || 'request failed');
  return data;
}

async function fetchAllRows() {
  const data = await postAction({ action: 'list' });
  if (!data.rows) throw new Error('no rows in response: ' + JSON.stringify(data).slice(0, 200));
  return data.rows;
}

function App() {
  const [loaded, setLoaded] = useState(false);
  const [rows, setRows] = useState([]);
  const [syncState, setSyncState] = useState('idle');
  const [banner, setBanner] = useState('');
  const [bannerErr, setBannerErr] = useState(false);

  const today = new Date();
  const [viewYear, setViewYear] = useState(today.getFullYear());
  const [viewMonth, setViewMonth] = useState(today.getMonth());
  const [selectedDate, setSelectedDate] = useState(todayStr());

  const [newSchedule, setNewSchedule] = useState('');
  const [newScheduleTime, setNewScheduleTime] = useState('');
  const [editingScheduleId, setEditingScheduleId] = useState(null);
  const [editingScheduleText, setEditingScheduleText] = useState('');
  const [editingScheduleTime, setEditingScheduleTime] = useState('');
  const [diaryText, setDiaryText] = useState('');
  const [savingSchedule, setSavingSchedule] = useState(false);
  const [savingDiary, setSavingDiary] = useState(false);

  function showBanner(msg, isErr, ms) {
    setBanner(msg);
    setBannerErr(!!isErr);
    setTimeout(() => setBanner(''), ms || 2500);
  }

  const reload = useCallback(async () => {
    setSyncState('busy');
    try {
      const list = await fetchAllRows();
      setRows(list);
      setSyncState('idle');
    } catch (e) {
      setSyncState('error');
      showBanner('Load error: ' + (e && e.message ? e.message : String(e)), true, 999999);
    }
  }, []);

  useEffect(() => {
    (async () => {
      await reload();
      setLoaded(true);
    })();
  }, [reload]);

  useEffect(() => {
    const diaryRow = rows.find(r => r.date === selectedDate && r.type === 'diary');
    setDiaryText(diaryRow ? diaryRow.content : '');
    setEditingScheduleId(null);
    setEditingScheduleText('');
    setEditingScheduleTime('');
    setNewSchedule('');
    setNewScheduleTime('');
  }, [selectedDate, rows]);

  function goPrevMonth() {
    let m = viewMonth - 1, y = viewYear;
    if (m < 0) { m = 11; y -= 1; }
    setViewMonth(m); setViewYear(y);
  }
  function goNextMonth() {
    let m = viewMonth + 1, y = viewYear;
    if (m > 11) { m = 0; y += 1; }
    setViewMonth(m); setViewYear(y);
  }

  const firstOfMonth = new Date(viewYear, viewMonth, 1);
  const startWeekday = (firstOfMonth.getDay() + 6) % 7; // Monday=0
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  function dotsFor(dateStr) {
    const dayRows = rows.filter(r => r.date === dateStr);
    return {
      hasSchedule: dayRows.some(r => r.type === 'schedule'),
      hasDiary: dayRows.some(r => r.type === 'diary'),
    };
  }

  const selectedSchedules = rows
    .filter(r => r.date === selectedDate && r.type === 'schedule')
    .sort((a, b) => (a.time || '99:99').localeCompare(b.time || '99:99'));

  async function handleAddSchedule() {
    const text = newSchedule.trim();
    if (!text) return;
    setSavingSchedule(true);
    try {
      await postAction({ action: 'addSchedule', date: selectedDate, time: newScheduleTime, content: text });
      await reload();
      setNewSchedule('');
      setNewScheduleTime('');
      showBanner('Schedule added.', false, 1500);
    } catch (e) {
      showBanner('Save error: ' + e.message, true, 3000);
    } finally {
      setSavingSchedule(false);
    }
  }

  function startEditSchedule(r) {
    setEditingScheduleId(r.row);
    setEditingScheduleText(r.content);
    setEditingScheduleTime(r.time || '');
  }

  async function handleUpdateSchedule() {
    setSavingSchedule(true);
    try {
      await postAction({ action: 'updateSchedule', row: editingScheduleId, time: editingScheduleTime, content: editingScheduleText.trim() });
      await reload();
      setEditingScheduleId(null);
      setEditingScheduleText('');
      setEditingScheduleTime('');
      showBanner('Schedule updated.', false, 1500);
    } catch (e) {
      showBanner('Save error: ' + e.message, true, 3000);
    } finally {
      setSavingSchedule(false);
    }
  }

  async function handleDeleteSchedule(row) {
    setSavingSchedule(true);
    try {
      await postAction({ action: 'deleteSchedule', row: row });
      await reload();
      showBanner('Deleted.', false, 1500);
    } catch (e) {
      showBanner('Delete error: ' + e.message, true, 3000);
    } finally {
      setSavingSchedule(false);
    }
  }

  async function handleSaveDiary() {
    setSavingDiary(true);
    try {
      await postAction({ action: 'saveDiary', date: selectedDate, content: diaryText });
      await reload();
      showBanner('Diary saved.', false, 1500);
    } catch (e) {
      showBanner('Save error: ' + e.message, true, 3000);
    } finally {
      setSavingDiary(false);
    }
  }

  if (!loaded) {
    return <div className="loading">Loading from sheet…</div>;
  }

  return (
    <div>
      <div className="header">
        <h1><span className="drop">●</span> Schedule &amp; Diary</h1>
        <div className="sync-status">
          <span className={`sync-dot ${syncState === 'error' ? 'error' : syncState === 'busy' ? 'busy' : ''}`}></span>
          {syncState === 'error' ? 'Connection error' : syncState === 'busy' ? 'Syncing' : 'Synced'}
        </div>
      </div>

      <div className={`banner ${banner ? 'show' : ''} ${bannerErr ? 'error' : ''}`}>{banner}</div>

      <div className="card">
        <div className="month-nav">
          <button onClick={goPrevMonth}>‹</button>
          <div className="label">{formatMonthLabel(viewYear, viewMonth)}</div>
          <button onClick={goNextMonth}>›</button>
        </div>
        <div className="weekday-row">
          <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
        </div>
        <div className="day-grid">
          {cells.map((d, idx) => {
            if (d === null) return <div className="day-cell empty" key={idx}></div>;
            const dateStr = ymd(viewYear, viewMonth, d);
            const { hasSchedule, hasDiary } = dotsFor(dateStr);
            const isToday = dateStr === todayStr();
            const isSelected = dateStr === selectedDate;
            return (
              <div
                key={idx}
                className={`day-cell ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''}`}
                onClick={() => setSelectedDate(dateStr)}
              >
                <div className="day-num">{d}</div>
                <div className="day-dots">
                  {hasSchedule && <div className="day-dot schedule"></div>}
                  {hasDiary && <div className="day-dot diary"></div>}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="card">
        <div className="selected-date-label">{formatSelectedLabel(selectedDate)}</div>
        <h2>Schedule</h2>
        <div className="schedule-list">
          {selectedSchedules.length === 0 && <div className="empty-state">No schedules yet.</div>}
          {selectedSchedules.map(r => (
            editingScheduleId === r.row ? (
              <div className="schedule-row" key={r.row}>
                <input
                  type="time"
                  style={{maxWidth: '90px'}}
                  value={editingScheduleTime}
                  disabled={savingSchedule}
                  onChange={e => setEditingScheduleTime(e.target.value)}
                />
                <input
                  type="text"
                  value={editingScheduleText}
                  disabled={savingSchedule}
                  onChange={e => setEditingScheduleText(e.target.value)}
                />
                <button className="icon-btn edit" disabled={savingSchedule} onClick={handleUpdateSchedule}>Save</button>
                <button className="icon-btn delete" disabled={savingSchedule} onClick={() => { setEditingScheduleId(null); setEditingScheduleText(''); setEditingScheduleTime(''); }}>Cancel</button>
              </div>
            ) : (
              <div className="schedule-row" key={r.row}>
                <div className="schedule-content">{r.time ? `${r.time} · ${r.content}` : r.content}</div>
                <button className="icon-btn edit" disabled={savingSchedule} onClick={() => startEditSchedule(r)}>Edit</button>
                <button className="icon-btn delete" disabled={savingSchedule} onClick={() => handleDeleteSchedule(r.row)}>Delete</button>
              </div>
            )
          ))}
        </div>
        <div style={{display: 'flex', gap: '8px'}}>
          <input
            type="time"
            style={{maxWidth: '110px'}}
            value={newScheduleTime}
            disabled={savingSchedule}
            onChange={e => setNewScheduleTime(e.target.value)}
          />
          <input
            type="text"
            placeholder="Add a new schedule"
            value={newSchedule}
            disabled={savingSchedule}
            onChange={e => setNewSchedule(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') handleAddSchedule(); }}
          />
        </div>
        <div className="btn-row">
          <button className="primary" disabled={savingSchedule} onClick={handleAddSchedule}>
            {savingSchedule ? 'Saving…' : 'Add Schedule'}
          </button>
        </div>
      </div>

      <div className="card">
        <h2>Diary (free text)</h2>
        <textarea
          placeholder="Write freely about today."
          value={diaryText}
          disabled={savingDiary}
          onChange={e => setDiaryText(e.target.value)}
        />
        <div className="btn-row">
          <button className="primary" disabled={savingDiary} onClick={handleSaveDiary}>
            {savingDiary ? 'Saving…' : 'Save Diary'}
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
